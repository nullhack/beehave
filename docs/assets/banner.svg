<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="beehave project banner">
  <defs>
    <clipPath id="mark-body">
      <path d="M 42 18 L 58 18 L 58 36 Q 58 40 66 46 Q 78 56 78 72 Q 78 92 50 92 Q 22 92 22 72 Q 22 56 34 46 Q 42 40 42 36 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="#1e2128"/>

  <!-- Left zone: brand mark (scaled 2x) -->
  <g transform="translate(70, 50) scale(2)">
    <path d="M 42 18 L 58 18 L 58 36 Q 58 40 66 46 Q 78 56 78 72 Q 78 92 50 92 Q 22 92 22 72 Q 22 56 34 46 Q 42 40 42 36 Z"
          fill="#f5a800" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <g clip-path="url(#mark-body)">
      <rect x="10" y="50" width="80" height="10" rx="5" fill="#c87d00"/>
      <rect x="10" y="64" width="80" height="10" rx="5" fill="#c87d00"/>
      <rect x="10" y="78" width="80" height="10" rx="5" fill="#c87d00"/>
    </g>
    <path d="M 46 18 Q 44 8 36 6" fill="none" stroke="#f5a800" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="36" cy="6" r="3.5" fill="#ffffff"/>
    <path d="M 54 18 Q 56 8 64 6" fill="none" stroke="#f5a800" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="64" cy="6" r="3.5" fill="#ffffff"/>
  </g>

  <!-- Center zone: wordmark -->
  <text x="320" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="700" letter-spacing="-2">
    <tspan fill="#f5a800">Bee</tspan><tspan fill="#e8eaef">have</tspan>
  </text>
  <text x="320" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a0a5b0">BDD living documentation in sync</text>

  <!-- Accent underline -->
