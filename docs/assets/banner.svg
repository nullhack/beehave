<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="beehave project banner">
  <defs>
    <!-- Body clip for the mark stripes -->
    <clipPath id="mark-body">
      <path d="M 38 38 L 62 38 L 62 44 Q 62 48 68 52 Q 80 62 80 76 Q 80 92 50 92 Q 20 92 20 76 Q 20 62 32 52 Q 38 48 38 44 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="#1e2128"/>

  <!-- Left zone: brand mark (scaled 2x) -->
  <g transform="translate(70, 50) scale(2)">
    <path d="M 38 38 L 62 38 L 62 44 Q 62 48 68 52 Q 80 62 80 76 Q 80 92 50 92 Q 20 92 20 76 Q 20 62 32 52 Q 38 48 38 44 Z" fill="#f5a800"/>
    <g clip-path="url(#mark-body)">
      <rect x="10" y="56" width="80" height="10" rx="5" fill="#c87d00"/>
      <rect x="10" y="70" width="80" height="10" rx="5" fill="#c87d00"/>
      <rect x="10" y="84" width="80" height="10" rx="5" fill="#c87d00"/>
    </g>
    <path d="M 42 38 Q 40 22 32 18" fill="none" stroke="#f5a800" stroke-width="4" stroke-linecap="round"/>
    <circle cx="32" cy="18" r="4.5" fill="#f5a800"/>
    <path d="M 58 38 Q 60 22 68 18" fill="none" stroke="#f5a800" stroke-width="4" stroke-linecap="round"/>
    <circle cx="68" cy="18" r="4.5" fill="#f5a800"/>
  </g>

  <!-- Center zone: wordmark -->
  <text x="320" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700">
    <tspan fill="#f5a800">Bee</tspan><tspan fill="#e8eaef">have</tspan>
  </text>
  <text x="320" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#a0a5b0">BDD living documentation in sync</text>

  <!-- Accent underline -->
  <rect x="320" y="215" width="680" height="4" rx="2" fill="#f5a800" opacity="0.35"/>

  <!-- Right zone: subtle decorative circles -->
  <circle cx="1080" cy="80"  r="25" fill="#f5a800" opacity="0.06"/>
  <circle cx="1140" cy="120" r="20" fill="#f5a800" opacity="0.06"/>
  <circle cx="1050" cy="180" r="30" fill="#f5a800" opacity="0.06"/>
  <circle cx="1120" cy="230" r="22" fill="#f5a800" opacity="0.06"/>
</svg>
